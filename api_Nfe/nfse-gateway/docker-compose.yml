services:
  nfse-gateway:
    build:
      context: ..
      dockerfile: nfse-gateway/Dockerfile
    container_name: mais-gestao-nfse-gateway
    ports:
      - "8089:8089"
    env_file:
      - .env
    environment:
      NFSE_GATEWAY_SECRET: ${NFSE_GATEWAY_SECRET:-dev-secret-change-me}
    dns:
      - 1.1.1.1
      - 1.0.0.1
    restart: unless-stopped
