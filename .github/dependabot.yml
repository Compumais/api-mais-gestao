# Atualizações automáticas de dependências (PRs semanais, limite de ruído).
version: 2
updates:
  - package-ecosystem: npm
    directory: "/api"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - api

  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - web
