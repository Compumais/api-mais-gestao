version: "3.8"

services:
  api:
    image: ghcr.io/${GHCR_REPOSITORY_LOWER}-api:latest
    container_name: mais-gestao-api
    restart: unless-stopped
    env_file:
      - /opt/mais-gestao/.env.api
    ports:
      - "127.0.0.1:3333:3333"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3333/docs >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mais-gestao

  postgres:
    image: postgres:17
    container_name: mais-gestao-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mais_gestao}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mais_gestao}
      POSTGRES_DB: ${POSTGRES_DB:-mais_gestao}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mais_gestao} -d ${POSTGRES_DB:-mais_gestao}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mais-gestao

networks:
  mais-gestao:
    driver: bridge

volumes:
  pg_data:
