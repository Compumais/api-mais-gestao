version: '3.8'

services:
  postgres:
    image: postgres:17
    container_name: api-mais-gestao-db
    environment:
      POSTGRES_USER: compumais
      POSTGRES_PASSWORD: C0mpum415!33511861
      POSTGRES_DB: mais_gestao
    ports:
      - "1861:1861"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

